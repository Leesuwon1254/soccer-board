{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="card shadow-sm" style="width:100%; max-width:380px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🔒</div>
        <h5 class="fw-bold mt-2 mb-0">관리자 전용 페이지</h5>
        <p class="text-muted small mt-1">선수 관리 기능은 관리자만 접근할 수 있습니다.</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 text-center small fw-bold">
        비밀번호가 올바르지 않습니다.
      </div>
      {% endif %}

      <form method="post" action="{{ url_for('players_list') }}">
        <div class="mb-3">
          <label class="form-label fw-bold">비밀번호</label>
          <input class="form-control form-control-lg" type="password" name="password"
                 placeholder="비밀번호 입력" autofocus autocomplete="current-password">
        </div>
        <div class="d-grid">
          <button class="btn btn-primary btn-lg">확인</button>
        </div>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('attendance_page') }}" class="text-muted small">← 출석 페이지로 돌아가기</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
