<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>생활체육 축구 보드판</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f6f8fb}
    .brand{font-weight:700;letter-spacing:.3px}
    .nav-link.active{font-weight:700}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand brand" href="/">⚽ 보드판</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {{ 'active' if active_tab=='attendance' else '' }}" href="{{ url_for('attendance_page') }}">출석</a></li>
        <li class="nav-item"><a class="nav-link {{ 'active' if active_tab=='players' else '' }}" href="{{ url_for('players_list') }}">선수관리</a></li>
        <li class="nav-item"><a class="nav-link {{ 'active' if active_tab=='board' else '' }}" href="{{ url_for('board_latest') }}">보드(한 팀)</a></li>
        <li class="nav-item"><a class="nav-link {{ 'active' if active_tab=='scrimmage' else '' }}" href="{{ url_for('scrimmage_latest') }}">자체게임</a></li>
        <li class="nav-item"><a class="nav-link {{ 'active' if active_tab=='matches' else '' }}" href="{{ url_for('matches') }}">경기목록</a></li>
      </ul>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-danger btn-sm"
                onclick="requireAdmin('출석/경기 기록을 모두 삭제합니다.', doResetDB)">DB 초기화</button>
        <button class="btn btn-primary btn-sm"
                onclick="requireAdmin('선수 명단 파일을 업로드합니다.', doFileUpload)">파일 업로드</button>
      </div>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="mb-3">
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'info' if cat=='message' else cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<!-- 관리자 비밀번호 모달 -->
<div id="admin-modal" style="display:none;
     position:fixed; inset:0; background:rgba(0,0,0,0.5);
     z-index:9999; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:12px; padding:32px 28px;
              width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.2);
              font-family:'Noto Sans KR',sans-serif;">
    <div style="font-size:16px; font-weight:700; margin-bottom:6px;">
      🔒 관리자 확인
    </div>
    <div id="admin-modal-desc"
         style="font-size:13px; color:#666; margin-bottom:20px;">
      감독/코치만 실행할 수 있습니다.
    </div>
    <input id="admin-pw-input" type="password"
           placeholder="비밀번호 입력"
           style="width:100%; padding:10px 12px; border:1.5px solid #ddd;
                  border-radius:8px; font-size:14px; box-sizing:border-box;
                  outline:none; margin-bottom:10px;"
           onkeydown="if(event.key==='Enter') confirmAdminPw()"/>
    <div id="admin-pw-error"
         style="color:#dc2626; font-size:12px; margin-bottom:10px; display:none;">
      ❌ 비밀번호가 올바르지 않습니다.
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button onclick="closeAdminModal()"
              style="padding:8px 18px; border:1.5px solid #ccc;
                     border-radius:6px; background:#fff; cursor:pointer;
                     font-size:13px;">취소</button>
      <button onclick="confirmAdminPw()"
              style="padding:8px 18px; border:none; border-radius:6px;
                     background:#1d4ed8; color:#fff; cursor:pointer;
                     font-size:13px; font-weight:600;">확인</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── 관리자 모달 제어 ──────────────────────────────────────────────
let _adminCallback = null;

function requireAdmin(desc, cb) {
  _adminCallback = cb;
  document.getElementById('admin-modal-desc').textContent = desc;
  document.getElementById('admin-pw-input').value = '';
  document.getElementById('admin-pw-error').style.display = 'none';
  document.getElementById('admin-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
}

function closeAdminModal() {
  document.getElementById('admin-modal').style.display = 'none';
  _adminCallback = null;
}

async function confirmAdminPw() {
  const pw  = document.getElementById('admin-pw-input').value.trim();
  const err = document.getElementById('admin-pw-error');

  if (!pw) {
    err.textContent = '비밀번호를 입력해주세요.';
    err.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('/admin/verify', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ password: pw })
    });

    if (!res.ok) {
      err.textContent = `서버 오류 (${res.status})`;
      err.style.display = 'block';
      return;
    }

    const data = await res.json();
    console.log('[DEBUG] verify 응답:', data);

    if (data.ok) {
      const cb = _adminCallback;   // closeAdminModal이 null로 지우기 전에 먼저 저장
      closeAdminModal();
      if (typeof cb === 'function') {
        cb();
      } else {
        console.error('[ERROR] 콜백 함수가 없음:', cb);
      }
    } else {
      err.textContent = '❌ 비밀번호가 올바르지 않습니다.';
      err.style.display = 'block';
      document.getElementById('admin-pw-input').value = '';
      document.getElementById('admin-pw-input').focus();
    }
  } catch(e) {
    console.error('[ERROR] confirmAdminPw:', e);
    err.textContent = '오류: ' + e.message;
    err.style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAdminModal();
});

// ── 관리자 기능 함수들 ─────────────────────────────────────────────
function doResetDB() {
  console.log('[doResetDB] 실행');
  if (!confirm('⚠️ DB 초기화\n\n출석 기록과 경기 기록이 모두 삭제됩니다.\n선수 명단은 유지됩니다.\n\n계속하시겠습니까?')) {
    console.log('[doResetDB] 취소됨');
    return;
  }
  fetch('/api/reset', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'}
  })
  .then(function(res) {
    console.log('[doResetDB] HTTP 상태:', res.status);
    return res.json();
  })
  .then(function(data) {
    console.log('[doResetDB] 응답:', data);
    if (data.ok) {
      alert('✅ 초기화 완료!\n출석/경기 기록이 삭제됐습니다.');
      window.location.href = '/attendance';
    } else {
      alert('❌ 초기화 실패:\n' + data.message);
    }
  })
  .catch(function(e) {
    console.error('[doResetDB] 오류:', e);
    alert('❌ 오류: ' + e.message);
  });
}

function doFileUpload() {
  window.location.href = '/import';
}
</script>
</body>
</html>
