{% extends 'base.html' %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h4 class="m-0">{{ '선수 추가' if action=='new' else '선수 수정' }}</h4>
  <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('players_list') }}">목록으로</a>
</div>

<div class="card shadow-sm" style="max-width:480px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-bold">이름 <span class="text-danger">*</span></label>
        <input class="form-control" name="name" value="{{ player.name if player else '' }}" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">등급</label>
        <select class="form-select" name="skill_grade">
          {% for g in ['A','B','C'] %}
            <option value="{{ g }}" {{ 'selected' if (player and player.skill_grade==g) or (not player and g=='C') }}>
              {{ g }}{% if g=='A' %} (상){% elif g=='B' %} (중){% else %} (하){% endif %}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-bold">주 포지션</label>
          <select class="form-select" name="position1">
            <option value="">-</option>
            {% for pos in ['GK','DF','MF','FW'] %}
              <option value="{{ pos }}" {{ 'selected' if pos1==pos }}>{{ pos }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col">
          <label class="form-label fw-bold">부 포지션</label>
          <select class="form-select" name="position2">
            <option value="">-</option>
            {% for pos in ['GK','DF','MF','FW'] %}
              <option value="{{ pos }}" {{ 'selected' if pos2==pos }}>{{ pos }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">생년월일</label>
        <input class="form-control" type="date" name="birth_date"
               value="{{ player.birth_date.strftime('%Y-%m-%d') if player and player.birth_date else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">연락처</label>
        <input class="form-control" name="phone"
               value="{{ player.phone if player and player.phone else '' }}"
               placeholder="010-0000-0000">
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary">저장</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('players_list') }}">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
