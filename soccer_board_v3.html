}

window.addEventListener('appinstalled', function() {
  console.log('✅ 홈 화면에 추가됨');
  deferredPrompt = null;
});

function showTodayReport() {
  const sess    = getOrCreateSession();
  const matches = DB.matches.filter(m => m.session_id === sess.id);
  const att     = DB.attendance.filter(a => a.session_id === sess.id);
  const players = DB.players;
  const resting = DB.resting || [];

  // 출전 횟수 계산
  const playCount = {};
  att.forEach(a => { playCount[a.player_id] = 0; });
  for (const m of matches) {
    for (const t of (m.teams || [])) {
      for (const a of (t.assignments || [])) {
        if (playCount[a.player_id] !== undefined)
          playCount[a.player_id] = (playCount[a.player_id] || 0) + 1;
      }
    }
  }

  const attPlayers = att.map(a => {
    const p = players.find(x => x.id === a.player_id);
    return p ? { ...p, cnt: playCount[p.id] || 0 } : null;
  }).filter(Boolean);

  if (attPlayers.length === 0) {
    alert('오늘 출석한 선수가 없습니다.');
    return;
  }

  const totalGames = matches.length;
  const counts     = attPlayers.map(p => p.cnt);
  const maxCnt     = Math.max(...counts);
  const minCnt     = Math.min(...counts);
  const avgCnt     = counts.reduce((a,b) => a+b, 0) / counts.length;
  const diff       = maxCnt - minCnt;

  const maxPlayers  = attPlayers.filter(p => p.cnt === maxCnt);
  const minPlayers  = attPlayers.filter(p => p.cnt === minCnt);
  const restPlayers = attPlayers.filter(p => resting.includes(p.id));

  const gkPlayers  = attPlayers.filter(p => p.pos1 === 'GK');
  const mvpPlayers = maxPlayers.filter(p => !resting.includes(p.id));

  const sorted = [...attPlayers].sort((a,b) => b.cnt - a.cnt);

  function makeBar(cnt, max) {
    const filled = '█'.repeat(cnt);
    const empty  = '░'.repeat(Math.max(0, max - cnt));
    return filled + empty;
  }

  function cntColor(cnt) {
    if (cnt === 0)  return 'color:#9ca3af;';
    if (cnt <= 2)   return 'color:#16a34a; font-weight:700;';
    if (cnt <= 4)   return 'color:#f59e0b; font-weight:700;';
    return 'color:#dc2626; font-weight:700;';
  }

  let comments = [];
  if (diff === 0)      comments.push('🏆 오늘 모든 선수가 완벽하게 균등 출전했습니다!');
  else if (diff === 1) comments.push('🎯 매우 균등한 출전 분배였습니다! 로테이션이 잘 됐어요!');
  else if (diff === 2) comments.push('👍 전반적으로 균등했으나 일부 차이가 있었습니다.');
  else                 comments.push(`⚠️ 출전 횟수 차이가 ${diff}회 났습니다. 다음엔 더 균등하게!`);

  if (restPlayers.length > 0)
    comments.push(`🛋 ${restPlayers.length}명(${restPlayers.map(p=>p.name).join(', ')})이 휴식을 취했습니다.`);

  if (mvpPlayers.length > 0)
    comments.push(`🥇 개근상: ${mvpPlayers.map(p=>p.name).join(', ')} (${maxCnt}경기 전 출전!)`);

  gkPlayers.forEach(gk => {
    const c = playCount[gk.id] || 0;
    if (c > 0) comments.push(`🧤 GK ${gk.name}님, ${c}경기 수고하셨습니다!`);
  });

  if (attPlayers.length >= 30)
    comments.push(`🎉 오늘 ${attPlayers.length}명이나 참여하셨습니다! 성황이었네요!`);

  if (totalGames === 0)
    comments.push('📌 오늘 아직 경기가 진행되지 않았습니다.');

  comments.push('⚽ 오늘도 즐거운 하루였습니다! 다음 주에 또 만나요~ 👋');

  const statsHtml = `
    <div style="background:#f8fafc; border-radius:10px; padding:12px 14px; margin-bottom:12px;">
      <div style="font-weight:700; font-size:13px; color:#374151; margin-bottom:8px;">📊 기본 통계</div>
      <table style="width:100%; font-size:13px; border-collapse:collapse;">
        <tr><td style="padding:2px 0; color:#6b7280;">출석 인원</td><td style="font-weight:700;">${attPlayers.length}명</td>
            <td style="padding:2px 0; color:#6b7280;">총 경기</td><td style="font-weight:700;">${totalGames}경기</td></tr>
        <tr><td style="padding:2px 0; color:#6b7280;">평균 출전</td><td style="font-weight:700;">${avgCnt.toFixed(1)}회</td>
            <td style="padding:2px 0; color:#6b7280;">휴식자</td><td style="font-weight:700;">${restPlayers.length}명</td></tr>
        <tr><td style="padding:2px 0; color:#6b7280;">최다 출전</td>
            <td colspan="3" style="font-weight:700;">${maxCnt}회 (${maxPlayers.map(p=>p.name).join(', ')})</td></tr>
        <tr><td style="padding:2px 0; color:#6b7280;">최소 출전</td>
            <td colspan="3" style="font-weight:700;">${minCnt}회 (${minPlayers.map(p=>p.name).join(', ')})</td></tr>
      </table>
    </div>`;

  const distHtml = `
    <div style="background:#f8fafc; border-radius:10px; padding:12px 14px; margin-bottom:12px;">
      <div style="font-weight:700; font-size:13px; color:#374151; margin-bottom:8px;">📈 출전 횟수 분포</div>
      <div style="font-family:monospace; font-size:12px; max-height:200px; overflow-y:auto;">
        ${sorted.map(p => {
          const bar     = makeBar(p.cnt, maxCnt);
          const markStr = resting.includes(p.id) ? '🛋' : '';
          return `<div style="display:flex; align-items:center; gap:6px; margin-bottom:2px;">
            <span style="min-width:90px; font-size:11px;">${p.name}</span>
            <span style="${cntColor(p.cnt)}">${bar} ${p.cnt}회</span>
            <span>${markStr}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  const commentsHtml = `
    <div style="background:#f0fdf4; border-radius:10px; padding:12px 14px; border-left:4px solid #16a34a;">
      <div style="font-weight:700; font-size:13px; color:#374151; margin-bottom:8px;">💬 오늘의 한마디</div>
      ${comments.map(c => `<div style="font-size:13px; margin-bottom:6px;">${c}</div>`).join('')}
    </div>`;

  const finalHtml = statsHtml + distHtml + commentsHtml;
  document.getElementById('report-content').innerHTML = finalHtml;

  // 오늘 날짜로 저장
  const today = new Date();
  const dateKey = today.getFullYear().toString().slice(2)
    + String(today.getMonth()+1).padStart(2,'0')
    + String(today.getDate()).padStart(2,'0');
  saveReportToStorage(dateKey, finalHtml);

  showTodayReportView();
  document.getElementById('report-modal').classList.add('show');
}

function saveReportToStorage(dateKey, html) {
  let reports = JSON.parse(localStorage.getItem('sb_reports') || '{}');
  reports[dateKey] = html;
  localStorage.setItem('sb_reports', JSON.stringify(reports));
}

function showTodayReportView() {
  document.getElementById('report-today-view').style.display = '';
  document.getElementById('report-past-view').style.display = 'none';
}

function showPastReports() {
  const reports = JSON.parse(localStorage.getItem('sb_reports') || '{}');
  const dates = Object.keys(reports).sort().reverse();

  if (dates.length === 0) {
    document.getElementById('report-past-content').innerHTML =
      '<div style="color:#6b7280; text-align:center; padding:20px;">저장된 지난경기 리포트가 없습니다.</div>';
  } else {
    document.getElementById('report-past-content').innerHTML =
      '<div style="font-weight:700; font-size:13px; color:#374151; margin-bottom:10px;">📁 저장된 리포트 목록</div>' +
      dates.map(d => {
        const y = '20' + d.slice(0,2);
        const m = d.slice(2,4);
        const day = d.slice(4,6);
        return `<button class="btn btn-outline-secondary btn-sm w-100 mb-2 text-start"
          onclick="showPastReportDetail('${d}')">${y}-${m}-${day}</button>`;
      }).join('');
  }

  document.getElementById('report-today-view').style.display = 'none';
  document.getElementById('report-past-view').style.display = '';
}

function showPastReportDetail(dateKey) {
  const reports = JSON.parse(localStorage.getItem('sb_reports') || '{}');
  const html = reports[dateKey];
  if (!html) return;

  const y = '20' + dateKey.slice(0,2);
  const m = dateKey.slice(2,4);
  const day = dateKey.slice(4,6);

  document.getElementById('report-past-content').innerHTML =
    `<button class="btn btn-sm btn-link p-0 mb-2" onclick="showPastReports()">← 목록으로</button>
     <div style="font-weight:700; font-size:13px; color:#374151; margin-bottom:8px;">${y}-${m}-${day} 리포트</div>` + html;
}
</script>
